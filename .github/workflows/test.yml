name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  pytest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Compile-check every Python file under bootstrap/
        shell: bash
        run: |
          set -e
          # Only compile-check production files. Research scripts are
          # exploratory and excluded.
          for f in bootstrap/*.py; do
            echo "py_compile $f"
            python -m py_compile "$f"
          done

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short

  lint-toml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate every mods/*/patches.toml
        run: |
          python - <<'PY'
          import sys, tomllib
          from pathlib import Path
          errors = []
          for p in Path("mods").glob("*/patches.toml"):
              try:
                  with p.open("rb") as fh:
                      tomllib.load(fh)
                  print(f"OK   {p}")
              except Exception as e:
                  errors.append(f"{p}: {e}")
                  print(f"FAIL {p}: {e}", file=sys.stderr)
          if errors:
              sys.exit(1)
          PY

      - name: Validate every mods/*/meta.toml
        run: |
          python - <<'PY'
          import sys, tomllib
          from pathlib import Path
          errors = []
          for p in Path("mods").glob("*/meta.toml"):
              try:
                  with p.open("rb") as fh:
                      tomllib.load(fh)
                  print(f"OK   {p}")
              except Exception as e:
                  errors.append(f"{p}: {e}")
                  print(f"FAIL {p}: {e}", file=sys.stderr)
          if errors:
              sys.exit(1)
          PY
